      - 'r:HKEY_LOCAL_MACHINE\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Winlogon -> CachedLogonsCount -> n:^(\d+) compare <= 4'

  # N-28 - Desactivar Hybrid Sleep / Fast Startup
  - id: 200000
    title: "Asegurar que Hybrid Sleep / Fast Startup está desactivado."
    description: "Comprueba que el inicio rápido de Windows (Fast Startup / Hybrid Boot) está deshabilitado para evitar que el estado del sistema se almacene de forma que pueda debilitar controles de arranque seguro y cifrado."
