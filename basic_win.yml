  # N-09 - Renombrar / deshabilitar Administrator y deshabilitar Guest
  - id: 200005
    title: "Asegurar que la cuenta Administrator está protegida y la cuenta Invitado está deshabilitada."
    description: "Comprueba que la cuenta integrada Guest está deshabilitada y que la cuenta integrada Administrator está deshabilitada o renombrada según la política de la organización."
