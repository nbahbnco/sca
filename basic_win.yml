      - 'r:HKEY_LOCAL_MACHINE\SOFTWARE\Policies\Microsoft\Windows\WindowsUpdate\AU -> AUOptions -> 4'

  # N-05 / CIS 1.1.5 - Complejidad de contraseñas habilitada
  - id: 200002
    title: "Asegurar que 'Las contraseñas deben cumplir los requisitos de complejidad' está habilitado."
    description: "Comprueba que la directiva de seguridad 'Las contraseñas deben cumplir los requisitos de complejidad' está habilitada para obligar a usar mayúsculas, minúsculas, números y caracteres especiales en las contraseñas."
