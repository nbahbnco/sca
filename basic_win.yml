      - "c:powershell.exe -Command \"Get-CimInstance -ClassName Win32_UserAccount -Filter 'Name=''Guest'' and LocalAccount=true' | Select-Object Name,Disabled\" -> Disabled\\s+True"
      - "c:powershell.exe -Command \"Get-CimInstance -ClassName Win32_UserAccount -Filter 'Name=''Invitado'' and LocalAccount=true' | Select-Object Name,Disabled\""
      - "c:powershell.exe -Command \"Get-CimInstance -ClassName Win32_UserAccount -Filter 'Name=''Invitado'' and LocalAccount=true' | Select-Object Name,Disabled\" -> Disabled\\s+True"
      - "c:powershell.exe -Command \"Get-CimInstance -ClassName Win32_UserAccount -Filter 'Name=''Convidado'' and LocalAccount=true' | Select-Object Name,Disabled\""
      - "c:powershell.exe -Command \"Get-CimInstance -ClassName Win32_UserAccount -Filter 'Name=''Convidado'' and LocalAccount=true' | Select-Object Name,Disabled\" -> Disabled\\s+True"
      - "c:powershell.exe -Command \"Get-CimInstance -ClassName Win32_UserAccount -Filter 'LocalAccount=true AND SID LIKE ''S-1-5-21-%-500''' | Select-Object Name,Disabled\""
      - "c:powershell.exe -Command \"Get-CimInstance -ClassName Win32_UserAccount -Filter 'LocalAccount=true AND SID LIKE ''S-1-5-21-%-500''' | Select-Object Name,Disabled\" -> Disabled\\s+True|Name\\s+[^A|a]dministrator"

