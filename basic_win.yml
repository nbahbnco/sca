policy:
  id: "basic_win"
  file: "basic_win.yml"
  name: "Politica Basica de Windows"
  description: "Esta politica establece unas normas basicas. Adaptadas para funcionar en español"
  references:
    - https://www.cisecurity.org/cis-benchmarks/

requirements:
  title: "Comprobar que la plataforma Windows es Windows Server 2022"
  description: "Requisitos para ejecutar el benchmark CIS en Windows Server 2022"
  condition: any
  rules:
    - 'r:HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion -> ProductName -> r:^Windows Server 2022'
    - 'r:HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion -> ProductName -> r:^Windows Server 2025'
    - 'r:HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion -> ProductName -> r:^Windows Server 2019'
    - 'r:HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion -> ProductName -> r:^Windows 11 Pro'
    - 'r:HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion -> ProductName -> r:^Windows 11 Enterprise'
    - 'r:HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion -> ProductName -> r:^Windows 10 Enterprise'
    - 'r:HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion -> ProductName -> r:^Windows 10 Pro'
    - 'r:HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion -> ProductName -> r:^Windows.*'

checks:
  # 1.1.1 (L1) Ensure 'Enforce password history' is set to '24 or more password(s)' (Automated)
  - id: 127000
    title: "Asegurar que 'Implementar historial de contraseñas' está configurado como '24 o más contraseña(s)'."
    description: "Esta configuración de política determina el número de contraseñas únicas que deben asociarse con una cuenta de usuario antes de que pueda reutilizarse una contraseña antigua. El valor para esta configuración de política debe estar entre 0 y 24 contraseñas. El valor predeterminado para Windows Vista es 0 contraseñas, pero la configuración predeterminada en un dominio es 24 contraseñas. Para mantener la efectividad de esta configuración de política, utilice la configuración de Antigüedad mínima de contraseña para evitar que los usuarios cambien repetidamente su contraseña. El estado recomendado para esta configuración es: 24 o más contraseña(s). Nota: La configuración de la Política de contraseñas (sección 1.1) y la configuración de la Política de bloqueo de cuentas (sección 1.2) deben aplicarse a través del GPO de Política de dominio predeterminada para que estén globalmente en efecto en las cuentas de usuario del dominio como su comportamiento predeterminado. Si estas configuraciones se configuran en otro GPO, solo afectarán a las cuentas de usuario locales en las computadoras que reciben el GPO. Sin embargo, las excepciones personalizadas a las reglas predeterminadas de política de contraseñas y política de bloqueo de cuentas para usuarios y/o grupos específicos del dominio pueden definirse utilizando Objetos de configuración de contraseña (PSO), que están completamente separados de la Política de grupo y se configuran más fácilmente utilizando el Centro administrativo de Active Directory. Nota #2: A la fecha de publicación de este benchmark, Microsoft actualmente tiene un límite máximo de 24 contraseñas guardadas. Para más información, visite Implementar historial de contraseñas (Windows 10) - Seguridad de Windows | Microsoft Docs."
    rationale: "Cuanto más tiempo utilice un usuario la misma contraseña, mayor será la posibilidad de que un atacante determine la contraseña mediante ataques de fuerza bruta. Además, cualquier cuenta que haya sido comprometida seguirá siendo explotable mientras no se cambie la contraseña. Si se requieren cambios de contraseña pero no se impide la reutilización de contraseñas, o si los usuarios reutilizan continuamente un pequeño número de contraseñas, la efectividad de una buena política de contraseñas se reduce considerablemente. Si especifica un número bajo para esta configuración de política, los usuarios podrán utilizar repetidamente el mismo pequeño número de contraseñas. Si tampoco configura la configuración de Antigüedad mínima de contraseña, los usuarios podrían cambiar repetidamente sus contraseñas hasta que puedan reutilizar su contraseña original."
    remediation: "Para establecer la configuración recomendada a través de GP, configure la siguiente ruta de UI a 24 o más contraseña(s): Configuración del equipo\\Políticas\\Configuración de Windows\\Configuración de seguridad\\Políticas de cuenta\\Política de contraseñas\\Implementar historial de contraseñas."
    references:
      - https://www.cisecurity.org/white-papers/cis-password-policy-guide/
    compliance:
      - cis: ["1.1.1"]
      - cis_csc_v8: ["5.2"]
      - cis_csc_v7: ["16.2"]
      - cmmc_v2.0: ["IA.L2-3.5.7"]
      - pci_dss_v4.0: ["2.2.2", "8.3.5", "8.3.6", "8.6.3"]
      - soc_2: ["CC6.1"]
    condition: all
    rules:
      - 'c:powershell secedit /export /cfg $env:TEMP\secpol.cfg; Get-Content $env:TEMP\secpol.cfg | Select-String "PasswordHistorySize"; Remove-Item $env:TEMP\secpol.cfg -> n:PasswordHistorySize = (\d+) compare >= 24'

