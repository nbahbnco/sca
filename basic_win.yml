  # N-20 - Actualizaciones automáticas habilitadas
  - id: 200001
    title: "Asegurar que las actualizaciones automáticas de Windows están habilitadas."
    description: "Esta comprobación verifica que la configuración de directiva de Windows Update establece la instalación automática de actualizaciones, comprobando el valor de la clave de registro de políticas de Windows Update. El estado recomendado para esta configuración es que las actualizaciones se descarguen e instalen automáticamente."
